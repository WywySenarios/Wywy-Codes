services:
  django:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile.dev
      args:
        CONTAINER_GID: 2523
        CONTAINER_UID: 25233
    restart: "no"
    secrets: []
    env_file:
      - /etc/Wywy-Website-Control/config/.env
      - /etc/Wywy-Website-Control/config/.env.network
      - /etc/Wywy-Website-Control/config/agentic/.env
    environment:
      - ENVIRONMENT=test
      - DJANGO_SETTINGS_MODULE=config.settings.base
      - OPENCODE_INTEGRATION_TEST=1
      - DEEPSEEK_API_KEY=
      - OPENAI_API_KEY=
      - ANTHROPIC_API_KEY=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/workspace/Wywy-Website:/var/workspace/Wywy-Website
      - /var/log/Wywy-Website/agentic:/var/log/Wywy-Website/agentic
      - /var/lib/Wywy-Website/orchestrator:/var/lib/Wywy-Website/orchestrator
      - /etc/Wywy-Website-Control:/etc/Wywy-Website-Control:ro
      - /usr/local/Wywy-Website:/usr/local/Wywy-Website:ro
    command:
      - bash
      - -c
      - |
        python -m pytest /app/apps/orchestrator/ -v --tb=short 2>&1 \
          | tee /var/log/Wywy-Website/agentic/test-summary.log 2>/dev/null
        exit $${PIPESTATUS[0]}
  astro:
    build:
      context: ..
      dockerfile: docker/astro/Dockerfile
      args:
        CONTAINER_GID: 2523
      target: test
    volumes:
      - ../apps/astro/src:/app/src:rw
      - ../apps/astro/tests:/app/tests:rw
      - ../apps/astro/vitest.config.ts:/app/vitest.config.ts:ro
      - ../apps/astro/scripts/test.sh:/app/scripts/test.sh:ro
    command:
      - bash
      - scripts/test.sh
